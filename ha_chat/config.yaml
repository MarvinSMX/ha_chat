name: "HA Chat (OneNote RAG)"
description: "Sidebar-Chat mit RAG über OneNote, ChromaDB und Azure OpenAI. Keine Integration nötig."
version: "1.0.11"
slug: "ha_chat"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
ports:
  8765/tcp: 8765
ingress: true
options:
  # Gemeinsam (Fallback, wenn Embedding/Chat nicht getrennt gesetzt)
  azure_endpoint: ""
  azure_api_key: ""
  # Embedding (optional getrennt; sonst Fallback auf azure_endpoint / azure_api_key)
  azure_embedding_endpoint: ""
  azure_embedding_api_key: ""
  azure_embedding_deployment: "text-embedding-ada-002"
  # Chat/LLM (optional getrennt; sonst Fallback auf azure_endpoint / azure_api_key)
  azure_chat_endpoint: ""
  azure_chat_api_key: ""
  azure_chat_deployment: "gpt-4o"
  microsoft_client_id: ""
  microsoft_client_secret: ""
  microsoft_tenant_id: "common"
  # Nur dieses Notizbuch synchronisieren (optional; leer = alle Notizbücher)
  onenote_notebook_id: ""
  onenote_notebook_name: ""
  ha_url: ""
  ha_token: ""
schema:
  azure_endpoint: str
  azure_api_key: str
  azure_embedding_endpoint: str
  azure_embedding_api_key: str
  azure_embedding_deployment: str
  azure_chat_endpoint: str
  azure_chat_api_key: str
  azure_chat_deployment: str
  microsoft_client_id: str
  microsoft_client_secret: str
  microsoft_tenant_id: str
  onenote_notebook_id: str
  onenote_notebook_name: str
  ha_url: str
  ha_token: str
