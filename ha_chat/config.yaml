name: "HA Chat (OneNote RAG)"
description: "Sidebar-Chat mit RAG über OneNote, ChromaDB und Azure OpenAI. Keine Integration nötig."
version: "1.0.52"
slug: "ha_chat"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
ports:
  8765/tcp: 8099
ingress: true
options:
  n8n_inference_webhook_url: ""
  ha_url: ""
  ha_token: ""
  prompt_suggestions:
    - "Was kann ich dich fragen?"
    - "Welche Lichter sind gerade an?"
    - "Zeig mir den Status der Heizung"
    - "Welche Geräte sind aktiv?"
schema:
  n8n_inference_webhook_url: str
  ha_url: str
  ha_token: str
  prompt_suggestions:
    - str
