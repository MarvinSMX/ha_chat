name: "Dokumentation"
description: "Dokumentation für Home Assistant"
version: "1.0.130"
slug: "ha_chat"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
# Container-Port (App) → Host-Port (im Browser: http://<ha>:8765)
ports:
  8099/tcp: 8765
ingress: true
options:
  backend_inference_webhook_url: ""
  backend_enabled: true
  backend_sync_webhook_url: ""
  agent_backend: "backend"
  ha_url: ""
  ha_token: ""
  system_prompt: "Du bist ein hilfreicher Home-Assistant-Assistent. Antworte knapp und präzise auf Deutsch. Nutze verfügbare Tools nur wenn nötig und beachte Bereichs-/Raumbeschränkungen."
  mcp_enabled: true
  mcp_bearer_token: ""
  mcp_entity_allowlist: ""
  mcp_domain_allowlist: ""
  mcp_area_allowlist: ""
  mcp_search_embeddings_top_k: 200
  mcp_search_faiss_enabled: true
  mcp_search_faiss_index_dir: ""
  azure_openai_endpoint: ""
  azure_openai_api_key: ""
  azure_openai_embedding_deployment: ""
  azure_openai_api_version: "2024-02-15-preview"
  prompt_suggestions:
    - "Was kann ich dich fragen?"
    - "Welche Lichter sind gerade an?"
    - "Zeig mir den Status der Heizung"
    - "Welche Geräte sind aktiv?"
schema:
  backend_inference_webhook_url: str
  backend_enabled: bool
  backend_sync_webhook_url: str
  agent_backend: str
  ha_url: str
  ha_token: str
  system_prompt: str
  mcp_enabled: bool
  mcp_bearer_token: password
  mcp_entity_allowlist: str
  mcp_domain_allowlist: str
  mcp_area_allowlist: str
  mcp_search_embeddings_top_k: int
  mcp_search_faiss_enabled: bool
  mcp_search_faiss_index_dir: str
  azure_openai_endpoint: str
  azure_openai_api_key: password
  azure_openai_embedding_deployment: str
  azure_openai_api_version: str
  prompt_suggestions:
    - str
