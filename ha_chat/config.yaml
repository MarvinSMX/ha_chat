name: "Dokumentation"
description: "Dokumentation für Home Assistant"
version: "1.0.92"
slug: "ha_chat"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
ports:
  8765/tcp: 8099
ingress: true
options:
  n8n_inference_webhook_url: ""
  n8n_sync_webhook_url: ""
  ha_url: ""
  ha_token: ""
  graph_tenant_id: ""
  graph_client_id: ""
  graph_client_secret: ""
  prompt_suggestions:
    - "Was kann ich dich fragen?"
    - "Welche Lichter sind gerade an?"
    - "Zeig mir den Status der Heizung"
    - "Welche Geräte sind aktiv?"
schema:
  n8n_inference_webhook_url: str
  n8n_sync_webhook_url: str
  ha_url: str
  ha_token: str
  graph_tenant_id: str
  graph_client_id: str
  graph_client_secret: str
  prompt_suggestions:
    - str
