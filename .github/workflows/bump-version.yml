# Erhöht bei jedem Push die Patch-Version in ha_chat/config.yaml
# und erstellt einen Commit (mit [skip ci], damit keine Endlosschleife entsteht).
name: Bump version

on:
  push:
    branches:
      - main
      - master
    # Kein paths-Filter: Version wird bei jedem Push erhöht

# Job überspringen, wenn der letzte Commit bereits ein Version-Bump war
jobs:
  bump:
    runs-on: ubuntu-latest
    if: "${{ !contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'chore: bump version') }}"

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find config and bump patch version
        id: bump
        run: |
          # Repo-Root kann addon/ha_chat (dann ha_chat/config.yaml) oder darüber (dann addon/ha_chat/ha_chat/config.yaml) sein
          if [ -f "addon/ha_chat/ha_chat/config.yaml" ]; then
            CONFIG="addon/ha_chat/ha_chat/config.yaml"
          elif [ -f "ha_chat/config.yaml" ]; then
            CONFIG="ha_chat/config.yaml"
          else
            echo "Could not find config.yaml (tried addon/ha_chat/ha_chat/config.yaml and ha_chat/config.yaml)"
            ls -laR . 2>/dev/null || true
            exit 1
          fi
          echo "config_path=$CONFIG" >> $GITHUB_OUTPUT
          V=$(grep '^version:' "$CONFIG" | sed -n 's/version: *"\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)".*/\1.\2.\3/p')
          if [ -z "$V" ]; then
            echo "Could not parse version from $CONFIG"
            cat "$CONFIG" | head -5
            exit 1
          fi
          MAJOR=$(echo "$V" | cut -d. -f1)
          MINOR=$(echo "$V" | cut -d. -f2)
          PATCH=$(echo "$V" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          sed -i "s/^version: .*/version: \"$NEW_VERSION\"/" "$CONFIG"
          echo "Bumped version $V -> $NEW_VERSION in $CONFIG"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.bump.outputs.config_path }}"
          if git diff --staged --quiet; then
            echo "No version change (already up to date)"
            exit 0
          fi
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push
